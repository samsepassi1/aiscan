name: "aiscan"
description: "AI-native security scanner for AI-generated code — catches the vulnerabilities AI coding assistants introduce"
author: "samsepassi1"

branding:
  icon: "shield"
  color: "red"

inputs:
  target:
    description: "Path to scan (relative to repo root)"
    required: false
    default: "."
  severity:
    description: "Minimum severity to report (CRITICAL, HIGH, MEDIUM, LOW, INFO)"
    required: false
    default: "HIGH"
  llm:
    description: "Enable LLM analysis tier (true/false)"
    required: false
    default: "false"
  llm-provider:
    description: "LLM provider (anthropic, openai, local)"
    required: false
    default: "anthropic"
  llm-model:
    description: "LLM model name"
    required: false
    default: "claude-sonnet-4-6"
  sarif-output:
    description: "Path to write SARIF output file"
    required: false
    default: "aiscan-results.sarif"
  exclude:
    description: "Comma-separated paths (relative to target) to exclude from scanning"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install aiscan
      env:
        AISCAN_ACTION_PATH: ${{ github.action_path }}
      run: pip install "$AISCAN_ACTION_PATH"
      shell: bash

    - name: Run aiscan
      shell: bash
      env:
        # All user-controlled inputs go through env vars rather than direct
        # ${{ }} interpolation into the script body — this prevents script
        # injection if a caller passes a value containing shell metacharacters.
        AISCAN_TARGET: ${{ inputs.target }}
        AISCAN_SEVERITY: ${{ inputs.severity }}
        AISCAN_SARIF_OUTPUT: ${{ inputs.sarif-output }}
        AISCAN_EXCLUDE: ${{ inputs.exclude }}
        AISCAN_LLM: ${{ inputs.llm }}
        AISCAN_LLM_PROVIDER: ${{ inputs.llm-provider }}
        AISCAN_LLM_MODEL: ${{ inputs.llm-model }}
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
      run: |
        set -euo pipefail
        ARGS=(scan "$AISCAN_TARGET"
              --severity "$AISCAN_SEVERITY"
              --format sarif
              --output "$AISCAN_SARIF_OUTPUT"
              --exit-code)
        if [ -n "$AISCAN_EXCLUDE" ]; then
          IFS=',' read -ra PATHS <<< "$AISCAN_EXCLUDE"
          for p in "${PATHS[@]}"; do
            # Trim leading/trailing whitespace via parameter expansion — no
            # subshell, no command substitution, so untrusted input cannot
            # execute arbitrary shell.
            p="${p#"${p%%[![:space:]]*}"}"
            p="${p%"${p##*[![:space:]]}"}"
            [ -n "$p" ] && ARGS+=(--exclude "$p")
          done
        fi
        if [ "$AISCAN_LLM" = "true" ]; then
          ARGS+=(--llm --llm-provider "$AISCAN_LLM_PROVIDER" --llm-model "$AISCAN_LLM_MODEL")
        fi
        aiscan "${ARGS[@]}"

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}
      if: always()

