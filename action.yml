name: "aiscan"
description: "AI-native security scanner for AI-generated code — catches the vulnerabilities AI coding assistants introduce"
author: "Sam Sepassi <samsepassi2@gmail.com>"

branding:
  icon: "shield"
  color: "red"

inputs:
  target:
    description: "Path to scan (relative to repo root)"
    required: false
    default: "."
  severity:
    description: "Minimum severity to report (CRITICAL, HIGH, MEDIUM, LOW, INFO)"
    required: false
    default: "HIGH"
  llm:
    description: "Enable LLM analysis tier (true/false)"
    required: false
    default: "false"
  llm-provider:
    description: "LLM provider (anthropic, openai, local)"
    required: false
    default: "anthropic"
  llm-model:
    description: "LLM model name"
    required: false
    default: "claude-sonnet-4-6"
  sarif-output:
    description: "Path to write SARIF output file"
    required: false
    default: "aiscan-results.sarif"
  exclude:
    description: "Comma-separated paths (relative to target) to exclude from scanning"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install aiscan
      run: pip install -e "${{ github.action_path }}"
      shell: bash

    - name: Run aiscan
      run: |
        EXCLUDE_ARGS=""
        if [ -n "${{ inputs.exclude }}" ]; then
          IFS=',' read -ra PATHS <<< "${{ inputs.exclude }}"
          for p in "${PATHS[@]}"; do
            EXCLUDE_ARGS="$EXCLUDE_ARGS --exclude $(echo $p | xargs)"
          done
        fi
        aiscan scan "${{ inputs.target }}" \
          --severity "${{ inputs.severity }}" \
          --format sarif \
          --output "${{ inputs.sarif-output }}" \
          --exit-code \
          $EXCLUDE_ARGS \
          ${{ inputs.llm == 'true' && '--llm' || '' }} \
          ${{ inputs.llm == 'true' && format('--llm-provider {0}', inputs.llm-provider) || '' }} \
          ${{ inputs.llm == 'true' && format('--llm-model {0}', inputs.llm-model) || '' }}
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}
      if: always()
