name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Diag — pip list (via annotations)
        continue-on-error: true
        run: |
          emit() { echo "::error file=diag,line=1::$1"; }
          emit "py=$(python --version 2>&1)"
          emit "tsl-version=$(python -m pip show tree-sitter-language-pack 2>&1 | grep -E '^Version' || echo NONE)"
          emit "tsl-location=$(python -m pip show tree-sitter-language-pack 2>&1 | grep -E '^Location' || echo NONE)"
          emit "ts-import=$(python -c 'import tree_sitter; print(getattr(tree_sitter, "__version__", "ok"))' 2>&1 | head -1)"
          emit "tsl-import=$(python -c 'import tree_sitter_language_pack; print("ok")' 2>&1 | head -1)"
          emit "sitepkgs=$(python -c 'import site; print(site.getsitepackages()[0])' 2>&1)"
          emit "lscache=$(ls $(python -c 'import site; print(site.getsitepackages()[0])') 2>&1 | grep -i tree || echo NONE)"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/aiscan/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --cov=aiscan --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  self-scan:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          target: "src/"
          severity: "HIGH"
          sarif-output: "aiscan-self-scan.sarif"
          exclude: "aiscan/rules"
