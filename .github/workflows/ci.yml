name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Show installed packages
        run: |
          python --version
          python -m pip list
          python -c "import tree_sitter; print('tree_sitter:', tree_sitter.__version__ if hasattr(tree_sitter, '__version__') else 'imported')"
          python -c "import tree_sitter_language_pack as p; print('tree_sitter_language_pack: imported ok')"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/aiscan/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --cov=aiscan --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  self-scan:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          target: "src/"
          severity: "HIGH"
          sarif-output: "aiscan-self-scan.sarif"
          exclude: "aiscan/rules"
