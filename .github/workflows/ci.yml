name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Show installed packages
        continue-on-error: true
        run: |
          {
            echo "### Python"
            python --version
            echo
            echo "### sys.path"
            python -c "import sys; [print(p) for p in sys.path]"
            echo
            echo "### pip list"
            python -m pip list
            echo
            echo "### tree_sitter import"
            python -c "import tree_sitter; print('ok:', getattr(tree_sitter, '__version__', 'no __version__'))" 2>&1
            echo
            echo "### tree_sitter_language_pack import"
            python -c "import tree_sitter_language_pack; print('ok')" 2>&1
            echo
            echo "### tree_sitter_language_pack install info"
            python -m pip show tree-sitter-language-pack 2>&1
          } | tee -a $GITHUB_STEP_SUMMARY

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/aiscan/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --cov=aiscan --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  self-scan:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          target: "src/"
          severity: "HIGH"
          sarif-output: "aiscan-self-scan.sarif"
          exclude: "aiscan/rules"
