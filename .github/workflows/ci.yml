name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Show installed packages
        continue-on-error: true
        run: |
          python --version > diag.txt
          echo "--- pip list ---" >> diag.txt
          python -m pip list >> diag.txt 2>&1
          echo "--- tree_sitter_language_pack info ---" >> diag.txt
          python -m pip show tree-sitter-language-pack >> diag.txt 2>&1 || echo "pip show failed" >> diag.txt
          echo "--- import attempts ---" >> diag.txt
          python -c "import tree_sitter; print('tree_sitter:', getattr(tree_sitter, '__version__', '?'))" >> diag.txt 2>&1 || echo "tree_sitter FAILED" >> diag.txt
          python -c "import tree_sitter_language_pack; print('tree_sitter_language_pack: ok')" >> diag.txt 2>&1 || echo "tree_sitter_language_pack FAILED" >> diag.txt
          cat diag.txt

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diag-py${{ matrix.python-version }}
          path: diag.txt
          if-no-files-found: ignore

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/aiscan/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --cov=aiscan --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  self-scan:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          target: "src/"
          severity: "HIGH"
          sarif-output: "aiscan-self-scan.sarif"
          exclude: "aiscan/rules"
